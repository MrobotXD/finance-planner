# Usa este archivo SOLO si NO tienes otra base Postgres free en Render.
# Renómbralo a render.yaml (o bórrala la base free vieja que no uses).
databases:
  - name: fintrack-db
    plan: free

services:
  - type: web
    name: fintrack-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fintrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromService:
          type: web
          name: fintrack-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: fintrack-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fintrack-api
          envVarKey: RENDER_EXTERNAL_URL
